<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity PayPal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Decorative Background Orbs */
        .orb-1, .orb-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.4);
            bottom: -50px;
            right: -50px;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            font-weight: 300;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Premium Button */
        .pay-btn {
            display: inline-block;
            background: linear-gradient(135deg, #0070ba 0%, #005ea6 100%);
            color: #fff;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 20px -5px rgba(0, 112, 186, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .pay-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 112, 186, 0.6);
        }

        .pay-btn:hover::before {
            left: 100%;
        }

        .price {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    
    <div class="card">
        <h1>Antigravity MCP Test</h1>
        <p>This is a premium, minimal demo to test the PayPal MCP integration.</p>
        
        <div class="price">$1.00</div>
        
        <a href="https://www.sandbox.paypal.com/checkoutnow?token=9MH152846L2557246" class="pay-btn" target="_blank">
            Pay with PayPal
        </a>
    </div>
</body>
</html>
